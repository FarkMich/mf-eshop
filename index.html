<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop — Michal Farkaš</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --indigo: #6366F1; --indigo-dark: #4338CA; --dark: #0D1117;
      --navy: #1E293B; --slate: #334155; --gray: #64748B;
      --light-gray: #94A3B8; --white: #FFFFFF; --emerald: #10B981;
      --red: #EF4444; --amber: #F59E0B;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Montserrat', Arial, sans-serif;
      background: var(--dark); color: var(--white);
      line-height: 1.6; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(var(--navy) 1px, transparent 1px),
        linear-gradient(90deg, var(--navy) 1px, transparent 1px);
      background-size: 120px 120px; opacity: 0.4;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; left: 0; top: 0;
      width: 5px; height: 100%; background: var(--indigo); z-index: 100;
    }
    nav, section, main, footer { position: relative; z-index: 1; }

    /* NAV */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 4rem; border-bottom: 1px solid var(--navy);
      position: sticky; top: 0; z-index: 50;
      background: rgba(13,17,23,0.9); backdrop-filter: blur(10px);
    }
    .nav-logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
    .nav-monogram {
      width: 40px; height: 40px; background: var(--indigo); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: var(--dark);
    }
    .nav-name { font-size: 14px; font-weight: 700; color: var(--white); }

    /* PRODUCT SECTION */
    .product-wrap {
      max-width: 1100px; margin: 0 auto;
      padding: 5rem 4rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: start;
    }
    @media(max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .product-wrap { grid-template-columns: 1fr; gap: 2.5rem; padding: 3rem 1.5rem; }
    }

    /* PRODUCT IMAGE */
    .product-image {
      background: var(--navy);
      border: 1px solid var(--slate);
      border-radius: 16px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px; color: var(--slate);
      position: relative;
      overflow: hidden;
    }
    .product-image img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }

    /* PRODUCT INFO */
    .product-label {
      font-size: 11px; font-weight: 700; letter-spacing: 3px;
      color: var(--indigo); margin-bottom: 0.75rem;
    }
    .product-name {
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 900; line-height: 1.15; margin-bottom: 1rem;
    }
    .product-price {
      font-size: 2.2rem; font-weight: 900;
      color: var(--indigo); margin-bottom: 0.5rem;
    }
    .product-price sup { font-size: 1.1rem; }
    .product-stock {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 12px; font-weight: 600; margin-bottom: 1.5rem;
    }
    .stock-dot { width: 7px; height: 7px; border-radius: 50%; }
    .in-stock .stock-dot { background: var(--emerald); }
    .in-stock { color: var(--emerald); }
    .low-stock .stock-dot { background: var(--amber); }
    .low-stock { color: var(--amber); }
    .out-stock .stock-dot { background: var(--red); }
    .out-stock { color: var(--red); }

    .product-desc {
      font-size: 14px; color: var(--gray);
      line-height: 1.8; margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--navy);
    }

    /* QUANTITY */
    .qty-label { font-size: 12px; font-weight: 600; color: var(--light-gray); margin-bottom: 0.5rem; }
    .qty-wrap { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
    .qty-btn {
      width: 36px; height: 36px; border-radius: 6px;
      background: var(--navy); border: 1px solid var(--slate);
      color: var(--white); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s;
    }
    .qty-btn:hover { border-color: var(--indigo); }
    .qty-num {
      width: 48px; text-align: center;
      font-size: 16px; font-weight: 700;
    }

    /* SHIPPING INFO */
    .shipping-info {
      background: var(--navy); border: 1px solid var(--slate);
      border-radius: 10px; padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .shipping-item {
      display: flex; align-items: center; gap: 0.6rem;
      font-size: 12px; color: var(--light-gray);
    }
    .shipping-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--indigo); flex-shrink: 0; }

    /* BUY BTN */
    .btn-buy {
      width: 100%; padding: 1rem;
      background: var(--indigo); color: var(--white);
      border: none; border-radius: 8px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: 'Montserrat', sans-serif;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 0.75rem;
    }
    .btn-buy:hover { background: var(--indigo-dark); transform: translateY(-1px); }
    .btn-buy:disabled { background: var(--slate); cursor: not-allowed; transform: none; }

    /* LOADING STATE */
    .loading-wrap {
      display: flex; align-items: center; justify-content: center;
      padding: 4rem; gap: 1rem; color: var(--gray);
    }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); z-index: 200;
      align-items: center; justify-content: center; padding: 1.5rem;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--navy); border: 1px solid var(--slate);
      border-radius: 16px; padding: 2.5rem;
      max-width: 520px; width: 100%;
      max-height: 90vh; overflow-y: auto;
      position: relative;
    }
    .modal-close {
      position: absolute; top: 1rem; right: 1.25rem;
      background: none; border: none; color: var(--gray);
      font-size: 22px; cursor: pointer; line-height: 1;
    }
    .modal-title { font-size: 1.4rem; font-weight: 900; margin-bottom: 0.25rem; }
    .modal-subtitle { font-size: 13px; color: var(--gray); margin-bottom: 1.5rem; }

    /* ORDER SUMMARY */
    .order-summary {
      background: var(--dark); border: 1px solid var(--slate);
      border-radius: 8px; padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .summary-row {
      display: flex; justify-content: space-between;
      font-size: 13px; padding: 0.3rem 0;
      color: var(--gray);
    }
    .summary-row.total {
      border-top: 1px solid var(--slate); margin-top: 0.5rem;
      padding-top: 0.75rem; font-weight: 700;
      color: var(--white); font-size: 15px;
    }
    .summary-row.total span:last-child { color: var(--indigo); }

    /* FORM */
    .form-section-title {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      color: var(--indigo); margin: 1.5rem 0 0.75rem;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .form-group { margin-bottom: 0.75rem; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--light-gray); margin-bottom: 0.35rem;
    }
    .form-group input {
      width: 100%; background: var(--dark); border: 1px solid var(--slate);
      border-radius: 6px; padding: 0.7rem 0.9rem;
      color: var(--white); font-size: 14px;
      font-family: 'Montserrat', sans-serif;
      transition: border-color 0.2s; outline: none;
    }
    .form-group input:focus { border-color: var(--indigo); }

    /* PAYMENT METHOD */
    .payment-options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.25rem; }
    .payment-option {
      border: 1px solid var(--slate); border-radius: 8px;
      padding: 0.85rem 1rem; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .payment-option.selected { border-color: var(--indigo); background: rgba(99,102,241,0.08); }
    .payment-option input[type="radio"] { accent-color: var(--indigo); }
    .payment-option-label { font-size: 13px; font-weight: 600; color: var(--white); }
    .payment-option-sub { font-size: 11px; color: var(--gray); }

    /* SUBMIT */
    .btn-submit {
      width: 100%; padding: 1rem;
      background: var(--indigo); color: var(--white);
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: 'Montserrat', sans-serif;
      transition: background 0.2s; margin-top: 0.5rem;
    }
    .btn-submit:hover { background: var(--indigo-dark); }
    .btn-submit:disabled { background: var(--slate); cursor: not-allowed; }

    .error-msg {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px; padding: 0.75rem 1rem;
      font-size: 13px; color: #FCA5A5;
      margin-bottom: 1rem; display: none;
    }
    .error-msg.visible { display: block; }

    /* SUCCESS */
    .success-screen { display: none; text-align: center; padding: 1rem 0; }
    .success-screen.active { display: block; }
    .modal-form.hidden { display: none; }
    .success-icon {
      width: 72px; height: 72px;
      background: rgba(16,185,129,0.12); border: 2px solid var(--emerald);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 1.5rem; font-size: 32px;
    }
    .success-order-id {
      font-size: 11px; color: var(--gray);
      margin: 0.5rem 0 1.5rem;
    }

    /* FOOTER */
    footer {
      padding: 2rem 4rem; border-top: 1px solid var(--navy);
      display: flex; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
      font-size: 12px; color: var(--gray);
    }
    footer a { color: var(--gray); text-decoration: none; }
    footer a:hover { color: var(--indigo); }
    @media(max-width: 768px) { footer { padding: 1.5rem; flex-direction: column; } }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <div class="nav-monogram">MF</div>
    <span class="nav-name">Michal Farkaš</span>
  </a>
</nav>

<!-- PRODUCT -->
<main>
  <div class="product-wrap" id="productWrap">
    <div class="loading-wrap" style="grid-column:1/-1;">Načítavam produkt...</div>
  </div>
</main>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>

    <div class="modal-form" id="modalForm">
      <div class="modal-title">Objednávka</div>
      <div class="modal-subtitle" id="modalSubtitle">Zadaj doručovacie údaje</div>

      <!-- ORDER SUMMARY -->
      <div class="order-summary" id="orderSummary"></div>

      <!-- ERROR -->
      <div class="error-msg" id="errorMsg"></div>

      <!-- CONTACT -->
      <div class="form-section-title">KONTAKT</div>
      <div class="form-row">
        <div class="form-group">
          <label>Meno a priezvisko *</label>
          <input type="text" id="fName" placeholder="Ján Novák"/>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="fEmail" placeholder="jan@example.com"/>
        </div>
      </div>

      <!-- SHIPPING -->
      <div class="form-section-title">DORUČOVACIA ADRESA</div>
      <div class="form-group">
        <label>Ulica a číslo *</label>
        <input type="text" id="fAddress" placeholder="Hlavná 1"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Mesto *</label>
          <input type="text" id="fCity" placeholder="Bratislava"/>
        </div>
        <div class="form-group">
          <label>PSČ *</label>
          <input type="text" id="fZip" placeholder="811 01"/>
        </div>
      </div>

      <!-- PAYMENT -->
      <div class="form-section-title">SPÔSOB PLATBY</div>
      <div class="payment-options">
        <label class="payment-option selected" id="opt-card" onclick="selectPayment('card')">
          <input type="radio" name="payment" value="card" checked/>
          <div>
            <div class="payment-option-label">Kartou online</div>
            <div class="payment-option-sub">Stripe - bezpečná platba</div>
          </div>
        </label>
        <label class="payment-option" id="opt-cod" onclick="selectPayment('cod')">
          <input type="radio" name="payment" value="cod"/>
          <div>
            <div class="payment-option-label">Dobierka</div>
            <div class="payment-option-sub">Platba pri doručení</div>
          </div>
        </label>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="submitOrder()">
        Potvrdiť objednávku →
      </button>
      <p style="font-size:11px;color:#475569;text-align:center;margin-top:0.6rem;">
        Odoslaním súhlasíš s <a href="/terms" style="color:#6366F1;">podmienkami</a>
      </p>
    </div>

    <!-- SUCCESS -->
    <div class="success-screen" id="successScreen">
      <div class="success-icon">✓</div>
      <h3 style="font-size:1.4rem;font-weight:900;margin-bottom:0.5rem;">Objednávka prijatá!</h3>
      <div class="success-order-id" id="successOrderId"></div>
      <p style="font-size:13px;color:#64748B;margin-bottom:1.5rem;" id="successMsg"></p>
      <button class="btn-submit" onclick="closeModal()">Zavrieť</button>
    </div>
  </div>
</div>

<footer>
  <span>© 2026 Michal Farkaš · <a href="https://michalfarkas.com">michalfarkas.com</a></span>
  <span>
    <a href="/about">About</a> &nbsp;·&nbsp;
    <a href="/terms">Terms</a> &nbsp;·&nbsp;
    <a href="/returns">Returns</a>
  </span>
  <span><a href="mailto:hello@michalfarkas.com">hello@michalfarkas.com</a></span>
</footer>

<script>
  let currentProduct = null;
  let qty = 1;
  let selectedPayment = 'card';
  const SHIPPING_COST = 399; // cents = €3.99

  // ── LOAD PRODUCT ─────────────────────────────────────
  async function loadProduct() {
    try {
      const res = await fetch('/api/products');
      const products = await res.json();

      if (!products || products.length === 0) {
        document.getElementById('productWrap').innerHTML =
          '<div class="loading-wrap" style="grid-column:1/-1;color:#EF4444;">Žiadne produkty nenájdené.</div>';
        return;
      }

      currentProduct = products[0];
      renderProduct(currentProduct);
    } catch(e) {
      document.getElementById('productWrap').innerHTML =
        '<div class="loading-wrap" style="grid-column:1/-1;color:#EF4444;">Chyba pri načítavaní produktu.</div>';
    }
  }

  function stockStatus(stock) {
    if (stock === 0) return { cls: 'out-stock', label: 'Vypredané' };
    if (stock <= 5) return { cls: 'low-stock', label: `Posledné ${stock} ks` };
    return { cls: 'in-stock', label: `Skladom (${stock} ks)` };
  }

  function formatPrice(cents) {
    return (cents / 100).toFixed(2).replace('.', ',') + ' €';
  }

  function renderProduct(p) {
    const ss = stockStatus(p.stock);
    document.getElementById('productWrap').innerHTML = `
      <div class="product-image">
        ${p.image_url
          ? `<img src="${p.image_url}" alt="${p.name}"/>`
          : `<span style="color:#334155;font-size:13px;">[ Foto produktu ]</span>`}
      </div>
      <div>
        <div class="product-label">PRODUKT</div>
        <h1 class="product-name">${p.name}</h1>
        <div class="product-price"><sup>€</sup>${(p.price/100).toFixed(2).replace('.',',')}</div>
        <div class="product-stock ${ss.cls}">
          <span class="stock-dot"></span>${ss.label}
        </div>
        <p class="product-desc">${p.description || ''}</p>

        <div class="qty-label">Počet kusov</div>
        <div class="qty-wrap">
          <button class="qty-btn" onclick="changeQty(-1)">-</button>
          <span class="qty-num" id="qtyDisplay">1</span>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>

        <div class="shipping-info">
          <div class="shipping-item"><span class="shipping-dot"></span>Doprava Packeta: ${formatPrice(SHIPPING_COST)}</div>
          <div class="shipping-item"><span class="shipping-dot"></span>Doručenie 2-3 pracovné dni</div>
          <div class="shipping-item"><span class="shipping-dot"></span>Dobierka dostupná</div>
          <div class="shipping-item"><span class="shipping-dot"></span>Vrátenie do 14 dní</div>
        </div>

        <button class="btn-buy" id="buyBtn"
          onclick="openModal()"
          ${p.stock === 0 ? 'disabled' : ''}>
          ${p.stock === 0 ? 'Vypredané' : 'Objednať teraz →'}
        </button>
        <p style="font-size:11px;color:#475569;text-align:center;">
          Bezpečná platba · Stripe alebo dobierka
        </p>
      </div>
    `;
  }

  function changeQty(delta) {
    if (!currentProduct) return;
    qty = Math.max(1, Math.min(currentProduct.stock, qty + delta));
    document.getElementById('qtyDisplay').textContent = qty;
  }

  // ── MODAL ─────────────────────────────────────────────
  function openModal() {
    if (!currentProduct) return;
    updateSummary();
    document.getElementById('modal').classList.add('active');
    document.getElementById('modalForm').classList.remove('hidden');
    document.getElementById('successScreen').classList.remove('active');
    document.getElementById('errorMsg').classList.remove('visible');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('active');
  }

  function updateSummary() {
    const p = currentProduct;
    const subtotal = p.price * qty;
    const total = subtotal + SHIPPING_COST;
    document.getElementById('orderSummary').innerHTML = `
      <div class="summary-row"><span>${p.name} × ${qty}</span><span>${formatPrice(subtotal)}</span></div>
      <div class="summary-row"><span>Doprava (Packeta)</span><span>${formatPrice(SHIPPING_COST)}</span></div>
      <div class="summary-row total"><span>Spolu</span><span>${formatPrice(total)}</span></div>
    `;
  }

  function selectPayment(method) {
    selectedPayment = method;
    document.getElementById('opt-card').classList.toggle('selected', method === 'card');
    document.getElementById('opt-cod').classList.toggle('selected', method === 'cod');
    document.querySelector('[value="card"]').checked = method === 'card';
    document.querySelector('[value="cod"]').checked = method === 'cod';
    document.getElementById('submitBtn').textContent =
      method === 'cod' ? 'Objednať s dobierkou →' : 'Potvrdiť a zaplatiť →';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  // ── SUBMIT ORDER ──────────────────────────────────────
  async function submitOrder() {
    const name    = document.getElementById('fName').value.trim();
    const email   = document.getElementById('fEmail').value.trim();
    const address = document.getElementById('fAddress').value.trim();
    const city    = document.getElementById('fCity').value.trim();
    const zip     = document.getElementById('fZip').value.trim();

    document.getElementById('errorMsg').classList.remove('visible');

    if (!name || !email || !address || !city || !zip) {
      showError('Prosím vyplň všetky povinné polia.');
      return;
    }
    if (!email.includes('@')) {
      showError('Zadaj platnú emailovú adresu.');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Spracovávam...';

    try {
      const total = currentProduct.price * qty + SHIPPING_COST;

      const res = await fetch('/api/order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          customer_name: name,
          customer_email: email,
          product_id: currentProduct.id,
          quantity: qty,
          total,
          shipping_address: address,
          shipping_city: city,
          shipping_zip: zip,
          payment_method: selectedPayment,
        })
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.error || 'Niečo sa pokazilo. Skús znova.');
        btn.disabled = false;
        btn.textContent = selectedPayment === 'cod' ? 'Objednať s dobierkou →' : 'Potvrdiť a zaplatiť →';
        return;
      }

      // SUCCESS
      document.getElementById('modalForm').classList.add('hidden');
      document.getElementById('successScreen').classList.add('active');
      document.getElementById('successOrderId').textContent =
        data.order_id ? `ID objednávky: ${data.order_id.split('-')[0].toUpperCase()}` : '';
      document.getElementById('successMsg').textContent =
        selectedPayment === 'cod'
          ? 'Objednávka potvrdená. Platíš pri doručení. Pošleme ti email s potvrdením.'
          : 'Objednávka potvrdená. Na email ti pošleme platobný odkaz.';

      // Reload stock display
      loadProduct();

    } catch(e) {
      showError('Chyba spojenia. Skontroluj internet a skús znova.');
      btn.disabled = false;
      btn.textContent = 'Potvrdiť objednávku →';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  loadProduct();
</script>

</body>
</html>
